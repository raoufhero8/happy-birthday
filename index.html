<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Meriem!</title>
<link 
href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" 
rel="stylesheet">
<style>
/* عام */
body {
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 margin: 0;
 background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #fc6076);
 background-size: 400% 400%;
 animation: gradientBG 10s ease infinite;
 font-family: 'Poppins', sans-serif;
 overflow: hidden;
 position: relative;
}
@keyframes gradientBG {
 0% { background-position: 0% 50%; }
 50% { background-position: 100% 50%; }
 100% { background-position: 0% 50%; }
}

/* العد التنازلي */
.countdown-container {
 background-color: rgba(255,255,255,0.7);
 padding: 30px;
 border-radius: 15px;
 margin-bottom: 20px;
 display: flex;
 flex-direction: column;
 align-items: center;
}
.countdown-title { font-size: 2em; margin-bottom: 20px; }
.countdown-timer { display: flex; gap: 20px; font-size: 1.5em; }
.time-unit { display: flex; flex-direction: column; align-items: center; }
.unit-label { font-size: 0.8em; margin-top: 5px; }

/* زر */
button {
 padding: 12px 25px;
 font-family: 'Poppins', sans-serif;
 background-color: #ff69b4;
 color: #fff;
 border: none;
 border-radius: 25px;
 cursor: pointer;
 display: none;
 margin-top: 10px;
 transition: 0.3s;
 z-index: 2;
 position: relative;
}
button:hover { background-color: #ff4da6; transform: scale(1.05); }

/* قلب Click it */
.heart-container {
 width: 150px;
 height: 150px;
 display: none;
 cursor: pointer;
 margin-bottom: 20px;
 position: relative;
 z-index: 2;
}
.heart-container span {
 position: absolute;
 width: 100%;
 height: 100%;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size: 2em;
 color: white;
 font-family: 'Pacifico', cursive;
}
.heart-container .heart-shape {
 position: absolute;
 top: 50%;
 left: 50%;
 width: 100%;
 height: 100%;
 background: red;
 transform: translate(-50%, -50%) rotate(45deg);
 opacity: 0.8;
}
.heart-container .heart-shape::before,
.heart-container .heart-shape::after {
 content: '';
 position: absolute;
 width: 100%;
 height: 100%;
 background: red;
 border-radius: 50%;
}
.heart-container .heart-shape::before { top: -50%; left: 0; }
.heart-container .heart-shape::after { left: 50%; top: 0; }

/* رسائل */
.message {
 font-size: 2em;
 font-family: 'Pacifico', cursive;
 text-align: center;
 opacity: 0;
 transition: opacity 2s ease-in-out;
 margin: 10px 0;
 text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
 color: white;
 z-index: 2;
 position: relative;
}

/* قلوب طائرة */
.floating-heart {
 position: absolute;
 font-size: 25px;
 animation: floatUp 4s linear infinite;
 z-index: 1;
}
@keyframes floatUp {
 0% { transform: translateY(0); opacity: 1; }
 100% { transform: translateY(-800px); opacity: 0; }
}

/* signature */
.signature {
 font-family: 'Pacifico', cursive;
 font-size: 1.5em;
 color: white;
 text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
 margin-top: 20px;
 opacity: 0;
 transition: opacity 2s ease-in-out;
 z-index: 2;
 position: relative;
}
</style>
</head>
<body>

<!-- العد التنازلي -->
<div class="countdown-container" id="countdownContainer">
 <div class="countdown-title">Un doux compte à rebours !</div>
 <div class="countdown-timer">
 <div class="time-unit">
 <span id="days"></span>
 <span class="unit-label">Jours</span>
 </div>
 <div class="time-unit">
 <span id="hours"></span>
 <span class="unit-label">Heures</span>
 </div>
 <div class="time-unit">
 <span id="minutes"></span>
 <span class="unit-label">Minutes</span>
 </div>
 <div class="time-unit">
 <span id="seconds"></span>
 <span class="unit-label">Secondes</span>
 </div>
 </div>
</div>

<!-- زر Start -->
<button id="startBtn">Start to Meriem 🎉</button>

<!-- قلب Click it -->
<div class="heart-container" id="clickHeart">
 <div class="heart-shape"></div>
 <span>Click it</span>
</div>

<!-- رسائل -->
<div class="message" id="msg1"></div>
<div class="message" id="msg2"></div>
<div class="message" id="msg3"></div>
<button id="btn2">Click Me</button>
<button id="btn3">The Real Gift!</button>
<button id="extraBtn">Additional Info</button>

<!-- signature -->
<div class="signature" id="signature">For you by Raouf</div>

<!-- موسيقى -->
<audio id="music" src="music.mp3" preload="auto"></audio>

<script 
src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// عناصر
const startBtn = document.getElementById('startBtn');
const clickHeart = document.getElementById('clickHeart');
const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');
const btn2 = document.getElementById('btn2');
const btn3 = document.getElementById('btn3');
const extraBtn = document.getElementById('extraBtn');
const signature = document.getElementById('signature');
const body = document.body;
const music = document.getElementById('music');
const countdownContainer = document.getElementById('countdownContainer');
const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

let personName = "";

// floating hearts
function createFloatingHeart() {
 const heartEl = document.createElement("div");
 heartEl.classList.add("floating-heart");
 heartEl.innerHTML = "💗";
 heartEl.style.left = Math.random() * window.innerWidth + "px";
 heartEl.style.bottom = "0px";
 document.body.appendChild(heartEl);
 setTimeout(() => heartEl.remove(), 4000);
}

// =====================
// العد التنازلي
// =====================
const targetDate = new Date("2026-03-22T12:00:00").getTime(); // الوقت النهائي 
للعد

const countdownInterval = setInterval(() => {
 const now = new Date().getTime();
 const distance = targetDate - now;

 if (distance < 0) {
 clearInterval(countdownInterval);
 countdownContainer.style.display = 'none'; // إخفاء العد
 startBtn.style.display = 'block'; // إظهار زر Start
 return;
 }

 const days = Math.floor(distance / (1000*60*60*24));
 const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
 const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
 const seconds = Math.floor((distance % (1000*60)) / 1000);

 daysEl.textContent = days;
 hoursEl.textContent = hours;
 minutesEl.textContent = minutes;
 secondsEl.textContent = seconds;

}, 1000);

// =====================
// Start button
// =====================
startBtn.addEventListener('click', () => {
 personName = "Meriem"; // تبقي النصوص كما هي
 startBtn.style.display = "none";
 clickHeart.style.display = "block";

 setInterval(createFloatingHeart, 500);
});

// =====================
// Click heart
// =====================
clickHeart.addEventListener('click', () => {
 clickHeart.style.display = "none";
 music.play().catch(() => console.log("Music blocked"));

 body.style.background = "black";

 setTimeout(() => {
 body.style.background = "linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, 
#fc6076)";
 msg1.style.opacity = '1';
 msg1.textContent = `Happy Birthday ${personName}! Wishing you a wonderful 
life! 💕`;

 confetti({particleCount: 150, spread: 100, origin: {y: 0.6}});
 setTimeout(() => {
 msg1.style.opacity = '0';
 btn2.style.display = 'block';
 }, 3000);
 }, 4000);
});

// =====================
// btn2 click
// =====================
btn2.addEventListener('click', () => {
 btn2.style.display = 'none';
 msg2.style.opacity = '1';
 msg2.textContent = "This is just the beginning…";
 setTimeout(() => {
 msg2.style.opacity = '0';
 btn3.style.display = 'block';
 }, 2500);
});

// =====================
// btn3 click
// =====================
btn3.addEventListener('click', () => {
 btn3.style.display = 'none';
 msg3.style.opacity = '1';
 msg3.textContent = "🎁 The real gift is waiting for you! 🎁";

 confetti({particleCount: 150, spread: 100, origin: {y: 0.6}});

 setTimeout(() => {
 extraBtn.style.display = 'block';
 }, 1000);
});

// =====================
// extraBtn click
// =====================
extraBtn.addEventListener('click', () => {
 extraBtn.style.display = 'none';
 msg3.textContent = "12 PM… you’ll understand 💖";
 signature.style.opacity = '1';

 confetti({particleCount: 100, spread: 120, origin: {y: 0.6}});
});
</script>
</body>
</html>
