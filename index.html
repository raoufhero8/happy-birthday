<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final Surprise 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:1.5s;
}

/* شاشة البداية */
#loading {
    color:white;
    font-size:20px;
}

/* الخلفية بعد */
.pink {
    background: linear-gradient(270deg, #ff9a9e, #ffdde1, #fc6076);
    background-size: 600% 600%;
    animation: bgMove 6s ease infinite;
}

@keyframes bgMove {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

/* القلب */
.heart {
    width:100px;
    height:100px;
    background:red;
    transform: rotate(45deg);
    position:absolute;
    cursor:pointer;
    animation: pulse 1s infinite;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:100px;
    height:100px;
    background:red;
    border-radius:50%;
}

.heart::before{ top:-50px; left:0; }
.heart::after{ left:50px; top:0; }

@keyframes pulse{
    0%{ transform: scale(1) rotate(45deg);}
    50%{ transform: scale(1.2) rotate(45deg);}
    100%{ transform: scale(1) rotate(45deg);}
}

/* النص */
#text{
    color:white;
    font-size:30px;
    text-align:center;
    opacity:0;
    transition:1s;
    font-family:'Pacifico';
}

/* قلوب */
.floating{
    position:absolute;
    animation: float 4s linear;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-800px);opacity:0;}
}

/* shake */
.shake{
    animation:shake 0.3s;
}
@keyframes shake{
    0%{transform:translate(0);}
    50%{transform:translate(5px);}
    100%{transform:translate(0);}
}
</style>
</head>

<body>

<div id="loading">Loading surprise...</div>
<div id="heart" class="heart" style="display:none;"></div>
<div id="text"></div>

<audio id="music" src="music.mp3"></audio>

<script>

// typing
function typeText(el, text){
    el.innerHTML="";
    let i=0;
    let int=setInterval(()=>{
        el.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(int);
    },50);
}

// floating hearts
function spawnHearts(){
    for(let i=0;i<15;i++){
        let h=document.createElement("div");
        h.innerHTML="💖";
        h.className="floating";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top="60%";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),4000);
    }
}

// المرحلة 1: شاشة سوداء
setTimeout(()=>{
    document.body.classList.add("pink");
    document.getElementById("loading").style.display="none";
    document.getElementById("heart").style.display="block";
},4000);

// المرحلة 2: ضغط القلب
document.getElementById("heart").onclick=()=>{
    let heart=document.getElementById("heart");
    heart.classList.add("shake");

    // اهتزاز موبايل
    if(navigator.vibrate) navigator.vibrate(200);

    spawnHearts();

    setTimeout(()=>{
        heart.style.display="none";

        let text=document.getElementById("text");
        text.style.opacity=1;

        typeText(text,
`Happy Birthday my bestie 💕
I wish you a life full of happiness ✨
— Raouf

Now check your gift 🎁`);

        // تشغيل صوت
        document.getElementById("music").play().catch(()=>{});

    },500);
};
</script>

</body>
</html>
