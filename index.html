<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Interactive!</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #1a1a1a;
        transition: background-color 2s ease-in-out;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .heart-container {
        width: 100px;
        height: 100px;
        display: none;
        cursor: pointer;
        margin-bottom: 20px;
        animation: spawnHeart 1s forwards;
        position: relative;
    }

    .heart {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        background: red;
        transform: translate(-50%, -50%) rotate(45deg);
        opacity: 0.8;
        animation: beat 1s infinite alternate;
    }

    .heart::before,
    .heart::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: red;
        border-radius: 50%;
    }

    .heart::before { top: -50%; left: 0; }
    .heart::after { left: 50%; top: 0; }

    .message {
        font-size: 2em;
        font-weight: bold;
        color: #fff;
        text-align: center;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        margin: 10px 0;
    }

    button {
        padding: 10px 20px;
        font-size: 1em;
        background-color: #ff69b4;
        color: #000;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        display: none;
        margin-top: 10px;
    }

    @keyframes beat {
        0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
        100% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); }
    }

    @keyframes spawnHeart {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
</head>
<body>

    <div class="heart-container" id="birthdayHeart">
        <div class="heart"></div>
    </div>

    <div class="message" id="msg1"></div>
    <div class="message" id="msg2"></div>
    <div class="message" id="msg3"></div>

    <button id="btn2">Click Me</button>
    <button id="btn3">The Real Gift!</button>

    <audio id="music" src="music.mp3" preload="auto"></audio>
    <button id="playButton">Play Music 🎵</button>

<script>
    const body = document.body;
    const heart = document.getElementById('birthdayHeart');
    const msg1 = document.getElementById('msg1');
    const msg2 = document.getElementById('msg2');
    const msg3 = document.getElementById('msg3');
    const btn2 = document.getElementById('btn2');
    const btn3 = document.getElementById('btn3');
    const music = document.getElementById('music');
    const playButton = document.getElementById('playButton');

    // Start background transition
    setTimeout(() => {
        body.style.backgroundColor = '#ff69b4';
        heart.style.display = 'block';
    }, 2000);

    // Click heart → first message
    heart.addEventListener('click', () => {
        msg1.textContent = "Happy birthday my bestieee! Wishing you a wonderful life! 💕";
        msg1.style.opacity = '1';
        heart.style.display = 'none';

        music.play().catch(() => playButton.style.display = 'block');

        setTimeout(() => {
            msg1.style.opacity = '0';
            btn2.style.display = 'block';
        }, 3000);
    });

    // Click btn2 → second message
    btn2.addEventListener('click', () => {
        btn2.style.display = 'none';
        msg2.textContent = "This is not the beginning";
        msg2.style.opacity = '1';

        setTimeout(() => {
            msg2.style.opacity = '0';
            btn3.style.display = 'block';
        }, 2000);
    });

    // Click btn3 → final gift
    btn3.addEventListener('click', () => {
        btn3.style.display = 'none';
        msg3.textContent = "🎁 The real gift is at school! 🎁";
        msg3.style.opacity = '1';
    });

    // Music loop
    music.addEventListener('ended', () => {
        music.currentTime = 0;
        music.play();
    });

    playButton.addEventListener('click', () => {
        music.play();
        playButton.style.display = 'none';
    });
</script>

</body>
</html>
