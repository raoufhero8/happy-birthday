<script>
// typing effect
function typeText(element, text, speed = 50) {
    element.textContent = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// 💖 انفجار قلوب
function explodeHearts() {
    for (let i = 0; i < 20; i++) {
        const h = document.createElement("div");
        h.innerHTML = "💖";
        h.classList.add("floating-heart");
        h.style.left = Math.random() * window.innerWidth + "px";
        h.style.bottom = "50%";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }
}

// floating hearts مستمر
function createFloatingHeart() {
    const heartEl = document.createElement("div");
    heartEl.classList.add("floating-heart");
    heartEl.innerHTML = "💗";
    heartEl.style.left = Math.random() * window.innerWidth + "px";
    heartEl.style.bottom = "0px";
    document.body.appendChild(heartEl);
    setTimeout(() => heartEl.remove(), 4000);
}
setInterval(createFloatingHeart, 600);

// Start button (ما غيرناه)
startBtn.addEventListener('click', () => {
    personName = nameInput.value || "Bestie 💖";
    nameInput.style.display = "none";
    startBtn.style.display = "none";
    heart.style.display = 'block';
});

// ❤️ Heart click (طورناه)
heart.addEventListener('click', () => {

    // اهتزاز
    if (navigator.vibrate) navigator.vibrate(200);

    heart.classList.add("shake");
    explodeHearts();

    // النص الجديد (أفضل توزيع)
    typeText(msg1, `Happy Birthday my bestiee 💕`);
    msg1.style.opacity = '1';

    setTimeout(() => {
        typeText(msg1, `${personName}, I wish you a life full of happiness ✨`);
    }, 2000);

    // إخفاء القلب
    setTimeout(() => {
        heart.style.display = 'none';
        btn2.style.display = 'block';
    }, 3500);

    // تشغيل الموسيقى
    music.play().catch(() => playButton.style.display = 'block');
});

// btn2
btn2.addEventListener('click', () => {
    btn2.style.display = 'none';
    typeText(msg2, "This is not everything... 👀");
    msg2.style.opacity = '1';

    setTimeout(() => {
        msg2.style.opacity = '0';
        btn3.style.display = 'block';
    }, 2500);
});

// btn3 (النهاية القوية)
btn3.addEventListener('click', () => {
    btn3.style.display = 'none';

    typeText(msg3, "🎁 Now check your gift 🎁");
    msg3.style.opacity = '1';

    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    setTimeout(() => {
        extraBtn.style.display = 'block';
    }, 1500);
});

// extraBtn (لمسة أخيرة)
extraBtn.addEventListener('click', () => {
    extraBtn.style.display = 'none';

    typeText(msg3, "Made with 💖 just for you — Raouf");
    msg3.style.opacity = '1';

    confetti({
        particleCount: 120,
        spread: 100,
        origin: { y: 0.6 }
    });
});
</script>
