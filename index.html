<script>
// اسم المستخدم والبدء
const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');
const heart = document.getElementById('birthdayHeart');
const msg1 = document.getElementById('msg1');
const music = document.getElementById('music');
const playButton = document.getElementById('playButton');
const signature = document.getElementById('signature');

let personName = "";
let giftIndex = 0;

// floating hearts
function createFloatingHeart() {
    const heartEl = document.createElement("div");
    heartEl.classList.add("floating-heart");
    heartEl.innerHTML = "💖";
    heartEl.style.left = Math.random() * window.innerWidth + "px";
    heartEl.style.bottom = "0px";
    document.body.appendChild(heartEl);
    setTimeout(() => heartEl.remove(), 4000);
}
setInterval(createFloatingHeart, 500);

// typing effect
function typeTextOnce(element, text, speed = 50) {
    element.textContent = "";
    let i = 0;
    const interval = setInterval(() => {
        element.textContent += text.charAt(i);
        i++;
        if(i >= text.length) clearInterval(interval);
    }, speed);
}

// قائمة 300 هدية
const birthdayGifts = [];
for(let i=1;i<=300;i++){
    birthdayGifts.push("Gift #" + i);
}

// Start button
startBtn.addEventListener('click', () => {
    personName = nameInput.value || "Bestie 💖";
    nameInput.style.display = "none";
    startBtn.style.display = "none";
    heart.style.display = 'block';
});

// Heart click
heart.addEventListener('click', () => {
    // كل نقرة تظهر هدية واحدة فقط
    if(giftIndex >= birthdayGifts.length){
        typeTextOnce(msg1, `All gifts are shown! 🎉`);
        msg1.style.opacity = '1';
        signature.style.opacity = '1';
        return;
    }

    const gift = birthdayGifts[giftIndex];
    giftIndex++;

    heart.classList.add("shake");
    setTimeout(() => heart.classList.remove("shake"), 500);

    typeTextOnce(msg1, `Happy Birthday ${personName}! Your gift: ${gift} 🎁`);
    msg1.style.opacity = '1';

    confetti({particleCount: 150, spread: 100, origin: {y: 0.6}});

    // Heart disappears briefly ثم يظهر مرة ثانية بدون تكرار الرسالة
    heart.style.display = 'none';
    setTimeout(() => {
        heart.style.display = 'block';
        msg1.style.opacity = '0';
    }, 2500);

    // تشغيل الموسيقى
    music.play().catch(() => playButton.style.display = 'block');
});

// Play music button
playButton.addEventListener('click', ()=>{
    music.play();
    playButton.style.display='none';
});

// music loop
music.addEventListener('ended', ()=>{
    music.currentTime = 0;
    music.play();
});
</script>
