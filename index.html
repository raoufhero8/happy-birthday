<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 17th Birthday, Meriem! 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#fc6076);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    position:relative;
}

@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
    margin-bottom:10px;
    z-index:2;
}

button{
    padding:12px 25px;
    background:#ff69b4;
    color:#fff;
    border:none;
    border-radius:25px;
    cursor:pointer;
    display:none;
    margin-top:10px;
    transition:0.3s;
    box-shadow:0 0 15px rgba(255,105,180,0.6);
}
button:hover{transform:scale(1.08);}

.heart-container{
    width:150px;
    height:150px;
    display:none;
    cursor:pointer;
    position:relative;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
}

.heart-container span{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2em;
    color:white;
    font-family:'Pacifico',cursive;
}

.heart-shape{
    position:absolute;
    top:50%;
    left:50%;
    width:100%;
    height:100%;
    background:red;
    transform:translate(-50%,-50%) rotate(45deg);
}
.heart-shape::before,
.heart-shape::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:red;
    border-radius:50%;
}
.heart-shape::before{top:-50%;}
.heart-shape::after{left:50%;}

.message{
    font-size:2em;
    font-family:'Pacifico',cursive;
    opacity:0;
    transition:2s;
    color:white;
    text-align:center;
    text-shadow:0 0 10px #fff,0 0 20px #ff69b4;
}

.floating-heart{
    position:absolute;
    font-size:25px;
    animation:floatUp 4s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-800px);opacity:0}
}

.signature{
    font-family:'Pacifico';
    font-size:1.5em;
    color:white;
    opacity:0;
    transition:2s;
}

/* SPARKLES */
.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    animation: sparkleAnim 1s linear forwards;
}
@keyframes sparkleAnim{
    to{
        transform:translateY(-20px);
        opacity:0;
    }
}

/* FLASH EFFECT */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}
</style>
</head>

<body>

<input id="nameInput" placeholder="to Meriem 💕🎂">
<button id="startBtn" style="display:block;">Meriem click here 🎉</button>

<div class="heart-container" id="clickHeart">
    <div class="heart-shape"></div>
    <span>Click it</span>
</div>

<div class="message" id="msg1"></div>
<div class="message" id="msg2"></div>
<div class="message" id="msg3"></div>

<button id="btn2">Keep Going… ✨</button>
<button id="btn3">The Real gift!🎁</button>
<button id="extraBtn">Something is Here!💕</button>

<div class="signature" id="signature">this For you by Raouf</div>

<div class="flash" id="flash"></div>

<audio id="music" src="music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');
const clickHeart = document.getElementById('clickHeart');
const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');
const btn2 = document.getElementById('btn2');
const btn3 = document.getElementById('btn3');
const extraBtn = document.getElementById('extraBtn');
const signature = document.getElementById('signature');
const music = document.getElementById('music');
const flash = document.getElementById('flash');

let started = false;

/* FLOATING HEARTS */
function createHeart(){
    const el = document.createElement("div");
    el.className="floating-heart";
    el.innerHTML="💗";
    el.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
}

/* SPARKLES */
document.addEventListener("mousemove",(e)=>{
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
});

/* START */
startBtn.onclick = () => {
    nameInput.style.display="none";
    startBtn.style.display="none";
    clickHeart.style.display="block";

    if(!started){
        setInterval(createHeart,150);
        started=true;
    }
};

/* CLICK HEART */
clickHeart.onclick = () => {
    clickHeart.style.display="none";
    music.play().catch(()=>{});

    document.body.style.background="black";

    // 💔 1
    msg1.style.opacity=1;
    msg1.innerText="There’s something I never told you…";

    setTimeout(()=>{
        msg1.style.opacity=0;

        // 💭 2
        msg2.style.opacity=1;
        msg2.innerText="Every time I see you…";

        setTimeout(()=>{
            msg2.style.opacity=0;

            // 💗 3
            msg3.style.opacity=1;
            msg3.innerText="You make my day better 💗";

            setTimeout(()=>{
                msg3.style.opacity=0;

                // 🔥 الكود الأصلي
                document.body.style.background="linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#fc6076)";
                
                msg1.style.opacity=1;
                msg1.innerText="Happyyyyy Birthday My bestieeee💗!May this moment stay with you forever 💕";

                confetti({particleCount:200,spread:120,origin:{y:0.6}});

                setTimeout(()=>{
                    msg1.style.opacity=0;
                    btn2.style.display="block";
                },7000);

            },3000);
        },3000);
    },3000);
};

/* BUTTON 2 */
btn2.onclick = () => {
    btn2.style.display="none";
    msg2.style.opacity=1;
    msg2.innerText="This is just the beginning…";

    setTimeout(()=>{
        msg2.style.opacity=0;
        btn3.style.display="block";
    },2500);
};

/* BUTTON 3 */
btn3.onclick = () => {
    btn3.style.display="none";
    msg3.style.opacity=1;
    msg3.innerText="🎁 The real gift is waiting for you in the school! 😉";

    confetti({particleCount:300,spread:150});

    setTimeout(()=>extraBtn.style.display="block",1000);
};

/* FINAL */
extraBtn.onclick = () => {
    extraBtn.style.display="none";

    msg3.innerText="12 PM… you’ll understand 💗";
    signature.style.opacity=1;

    flash.style.opacity=1;
    setTimeout(()=>flash.style.opacity=0,600);

    for(let i=0;i<50;i++){
        setTimeout(createHeart,i*100);
    }

    confetti({particleCount:500,spread:180,scalar:1.2});
};
</script>

</body>
</html>
