<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Interactive!</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #fc6076);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .heart-container {
        width: 100px;
        height: 100px;
        display: none;
        cursor: pointer;
        margin-bottom: 20px;
        animation: spawnHeart 1s forwards;
        position: relative;
    }

    .heart {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        background: red;
        transform: translate(-50%, -50%) rotate(45deg);
        opacity: 0.8;
        animation: beat 1s infinite alternate;
    }

    .heart::before,
    .heart::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: red;
        border-radius: 50%;
    }

    .heart::before { top: -50%; left: 0; }
    .heart::after { left: 50%; top: 0; }

    .message {
        font-size: 2.2em;
        font-family: 'Pacifico', cursive;
        text-align: center;
        opacity: 0;
        transition: opacity 3s ease-in-out;
        margin: 10px 0;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        color: white;
    }

    button {
        padding: 12px 25px;
        font-family: 'Poppins', sans-serif;
        background-color: #ff69b4;
        color: #fff;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        display: none;
        margin-top: 10px;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff4da6;
        transform: scale(1.05);
    }

    input {
        padding:10px;
        border-radius:10px;
        border:none;
        text-align:center;
        margin-bottom:10px;
    }

    @keyframes beat {
        0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
        100% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); }
    }

    @keyframes spawnHeart {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }

    .shake {
        animation: shake 0.5s;
    }

    .floating-heart {
        position: absolute;
        font-size: 20px;
        animation: floatUp 4s linear infinite;
    }

    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-800px); opacity: 0; }
    }
</style>
</head>
<body>

<input type="text" id="nameInput" placeholder="Meriem 🎂">
<button id="startBtn" style="display:block;">Start 🎉</button>

<div class="heart-container" id="birthdayHeart">
    <div class="heart"></div>
</div>

<div class="message" id="msg1"></div>
<div class="message" id="msg2"></div>
<div class="message" id="msg3"></div>

<button id="btn2">Click Me</button>
<button id="btn3">The Real Gift!</button>

<audio id="music" src="music.mp3" preload="auto"></audio>
<button id="playButton">Play Music 🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const body = document.body;
const heart = document.getElementById('birthdayHeart');
const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');
const btn2 = document.getElementById('btn2');
const btn3 = document.getElementById('btn3');
const music = document.getElementById('music');
const playButton = document.getElementById('playButton');

const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');

let personName = "";

// typing effect
function typeText(element, text, speed = 50) {
    element.textContent = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// floating hearts
function createFloatingHeart() {
    const heart = document.createElement("div");
    heart.classList.add("floating-heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "0px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
}
setInterval(createFloatingHeart, 500);

// start
startBtn.addEventListener('click', () => {
    personName = nameInput.value || "Bestie 💖";
    nameInput.style.display = "none";
    startBtn.style.display = "none";
    heart.style.display = 'block';
});

// heart click
heart.addEventListener('click', () => {
    heart.classList.add("shake");
    setTimeout(() => heart.classList.remove("shake"), 500);

    typeText(msg1, `Happy birthday my bestiee ${personName}! Wishing you a wonderful life! 💕`);
    msg1.style.opacity = '1';
    heart.style.display = 'none';

    music.play().catch(() => playButton.style.display = 'block');

    setTimeout(() => {
        msg1.style.opacity = '0';
        btn2.style.display = 'block';
    }, 4000);
});

// btn2
btn2.addEventListener('click', () => {
    btn2.style.display = 'none';
    typeText(msg2, "This is just the beginning");
    msg2.style.opacity = '1';

    setTimeout(() => {
        msg2.style.opacity = '0';
        btn3.style.display = 'block';
    }, 2500);
});

// btn3
btn3.addEventListener('click', () => {
    btn3.style.display = 'none';
    typeText(msg3, "🎁 The real gift is at school! 🎁");
    msg3.style.opacity = '1';

    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
});
// بعد 3 ثواني من ظهور الرسالة الأخيرة
setTimeout(() => {
    const finalMsg = document.createElement("div");
    finalMsg.textContent = "A little magic for the birthday star ✨ – Raouf";
    finalMsg.style.fontFamily = "'Pacifico', cursive";
    finalMsg.style.fontSize = "1.8em";
    finalMsg.style.color = "#fff";
    finalMsg.style.opacity = "0";
    finalMsg.style.textAlign = "center";
    finalMsg.style.marginTop = "20px";
    finalMsg.style.transition = "opacity 2s";

    document.body.appendChild(finalMsg);

    setTimeout(() => {
        finalMsg.style.opacity = "1";

        // اختياري: نجعل قلوب صغيرة تطير مع الرسالة
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement("div");
            heart.classList.add("floating-heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.bottom = "0px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

    }, 100);
}, 3000);
// music loop
music.addEventListener('ended', () => {
    music.currentTime = 0;
    music.play();
});

playButton.addEventListener('click', () => {
    music.play();
    playButton.style.display = 'none';
});
</script>

</body>
</html>
