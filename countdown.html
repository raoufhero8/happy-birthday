<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to 23:50</title>
<style>
body { font-family: 'Poppins', sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#ff9a9e; margin:0; }
.countdown { font-size:4em; color:white; text-shadow:2px 2px 10px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div class="countdown" id="countdown">00:00</div>

<script>
const display = document.getElementById('countdown');

// الساعة 23:50 اليوم
const target = new Date();
target.setHours(23,50,0,0);

const interval = setInterval(() => {
    const now = new Date();
    let distance = Math.floor((target - now)/1000); // فرق بالثواني

    if(distance <= 0){
        clearInterval(interval);
        display.textContent = "00:00";
        // بعد انتهاء العد انتقل لصفحة عيد الميلاد
        window.location.href = "index.html";
        return;
    }

    const minutes = Math.floor(distance/60);
    const seconds = distance%60;
    display.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
},1000);
</script>
</body>
</html>
